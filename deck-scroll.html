<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Skills — Scroll Deck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --bg: #F7FAFF;
  --panel: #FFFFFF;
  --line: #D7E2F3;
  --orange: #FF6B1A;
  --cyan: #087EA4;
  --white: #0B1324;
  --text: #1B2A41;
  --muted: #64748B;
}

* { box-sizing: border-box; }

html {
  background: var(--bg);
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  background:
    linear-gradient(rgba(145,181,232,0.22) 1px, transparent 1px),
    linear-gradient(90deg, rgba(145,181,232,0.22) 1px, transparent 1px),
    radial-gradient(circle at 50% 0%, rgba(8,126,164,0.10), transparent 36rem),
    var(--bg);
  background-size: 48px 48px, 48px 48px, auto, auto;
}

.deck {
  width: min(100% - 48px, 1320px);
  margin: 0 auto;
  padding: 36px 0 72px;
}

.deck-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  padding: 0 4px 28px;
}

.deck-title {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--white);
}

.deck-title span {
  color: var(--orange);
}

.deck-meta {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
  white-space: nowrap;
}

.slide-shell {
  margin: 0 0 52px;
}

.slide-shell:last-child {
  margin-bottom: 0;
}

.slide-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  height: 34px;
  padding: 0 2px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.slide-bar a {
  color: var(--cyan);
  text-decoration: none;
}

.slide-bar a:hover {
  color: var(--orange);
}

.slide-viewport {
  --scale: 1;
  width: 100%;
  max-width: 1280px;
  height: 720px;
  position: relative;
  overflow: hidden;
  margin: 0 auto;
  background: #FFFFFF;
  border: 1px solid var(--line);
  box-shadow: 0 0 0 1px rgba(8,126,164,0.10), 0 18px 36px rgba(12,28,54,0.12);
}

.slide-viewport iframe {
  position: absolute;
  inset: 0 auto auto 0;
  width: 1280px;
  height: 720px;
  border: 0;
  transform: scale(var(--scale));
  transform-origin: top left;
  background: #FFFFFF;
}

@media (max-width: 720px) {
  .deck {
    width: min(100% - 24px, 1320px);
    padding-top: 24px;
  }

  .deck-header {
    align-items: flex-start;
    flex-direction: column;
  }
}
</style>
</head>
<body>
<main class="deck">
  <header class="deck-header">
    <h1 class="deck-title"><span>Agent</span> Skills</h1>
    <div class="deck-meta">Scrollable HTML deck · 18 slides</div>
  </header>

  <section class="slide-shell" id="slide-01">
    <div class="slide-bar"><span>01 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 01" src="slide-01.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-02">
    <div class="slide-bar"><span>02 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 02" src="slide-02.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-03">
    <div class="slide-bar"><span>03 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 03" src="slide-03.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-04">
    <div class="slide-bar"><span>04 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 04" src="slide-04.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-05">
    <div class="slide-bar"><span>05 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 05" src="slide-05.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-06">
    <div class="slide-bar"><span>06 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 06" src="slide-06.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-07">
    <div class="slide-bar"><span>07 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 07" src="slide-07.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-08">
    <div class="slide-bar"><span>08 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 08" src="slide-08.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-09">
    <div class="slide-bar"><span>09 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 09" src="slide-09.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-10">
    <div class="slide-bar"><span>10 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 10" src="slide-10.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-11">
    <div class="slide-bar"><span>11 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 11" src="slide-11.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-12">
    <div class="slide-bar"><span>12 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 12" src="slide-12.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-13">
    <div class="slide-bar"><span>13 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 13" src="slide-13.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-14">

  </section>

  <section class="slide-shell" id="slide-15">

    <div class="slide-viewport"><iframe title="Slide 15" src="slide-15.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-16">
    <div class="slide-bar"><span>16 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 16" src="slide-16.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-17">
    <div class="slide-bar"><span>17 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 17" src="slide-17.html"></iframe></div>
  </section>

  <section class="slide-shell" id="slide-18">
    <div class="slide-bar"><span>18 / 18</span></div>
    <div class="slide-viewport"><iframe title="Slide 18" src="slide-18.html"></iframe></div>
  </section>
</main>

<script>
const slideWidth = 1280;
const slideHeight = 720;

function fitSlide(viewport) {
  const scale = Math.min(1, viewport.clientWidth / slideWidth);
  viewport.style.setProperty('--scale', scale);
  viewport.style.height = `${Math.round(slideHeight * scale)}px`;
}

const viewports = Array.from(document.querySelectorAll('.slide-viewport'));
const resizeObserver = new ResizeObserver(entries => {
  for (const entry of entries) fitSlide(entry.target);
});

for (const viewport of viewports) {
  fitSlide(viewport);
  resizeObserver.observe(viewport);
}
</script>
</body>
</html>
