<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
/* === AGENT SKILLS DECK — FUTURISTIC GAME UI === */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #F7FAFF;
  --bg2: #EEF4FF;
  --panel: #FFFFFF;
  --panel2: #F8FBFF;
  --border: #D7E2F3;
  --border-glow: #91B5E8;
  --orange: #FF6B1A;
  --orange-glow: #FF8A3D;
  --cyan: #087EA4;
  --cyan-glow: #0E7490;
  --purple: #9D4EFF;
  --green: #00FF94;
  --red: #FF3D5A;
  --pink: #FF4E9C;
  --amber: #FFB800;
  --white: #0B1324;
  --text: #1B2A41;
  --text-dim: #64748B;
  --text-muted: #8090A6;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  width: 1280px; height: 720px;
  overflow: hidden;
  font-family: 'Rajdhani', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: var(--bg);
  color: var(--text);
}

.slide {
  width: 1280px; height: 720px;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

/* === BACKGROUND GRID === */
.grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(145,181,232,0.24) 1px, transparent 1px),
    linear-gradient(90deg, rgba(145,181,232,0.24) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.22;
}
.grid-bg::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(247,250,255,0.92) 75%);
}

/* === CORNER BRACKETS === */
.corner {
  position: absolute; width: 32px; height: 32px;
  border-color: var(--border-glow);
  border-style: solid;
}
.corner.tl { top: 48px; left: 20px; border-width: 2px 0 0 2px; }
.corner.tr { top: 48px; right: 20px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

/* === TOP BAR === */
.topbar {
  position: absolute; top: 0; left: 0; right: 0; height: 36px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  background: rgba(255,255,255,0.96);
  border-bottom: 1px solid var(--border);
}
.topbar .brand {
  font-family: 'Orbitron', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 3px; color: var(--orange);
  text-transform: uppercase;
}
.topbar .nav {
  font-family: 'Orbitron', monospace;
  font-size: 9px; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase;
}
.topbar .page-num {
  font-family: 'Orbitron', monospace;
  font-size: 10px; color: var(--cyan);
  font-weight: 700;
}

/* === TITLES === */
.title-area {
  position: absolute; top: 60px; left: 48px; right: 48px;
}
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 40px; font-weight: 900;
  color: var(--white);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.title .accent { color: var(--orange); }
/* === PANELS === */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  position: relative;
  box-shadow: 0 10px 24px rgba(12,28,54,0.08);
}
.panel.accent-left { border-color: var(--orange); }
.panel.accent-cyan { border-color: var(--cyan); }
.panel.accent-purple { border-color: var(--purple); }
.panel.accent-green { border-color: var(--green); }
.panel.accent-red { border-color: var(--red); }
.panel.accent-pink { border-color: var(--pink); }

.panel-body {
  padding: 18px 20px;
  font-size: 17px; line-height: 1.45;
  color: var(--text);
}

.repo-link {
  display: inline-block;
  margin-top: 18px;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  line-height: 1.4;
  letter-spacing: 0.08em;
  color: var(--cyan);
  text-decoration: none;
  word-break: break-all;
}

.repo-link:hover { color: var(--orange); }

/* === STATS === */
.stat-block {
  text-align: center;
}
.stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px; font-weight: 900;
}
.stat-label {
  font-size: 9px; color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px; margin-top: 2px;
}

/* === ARROW === */
.arrow {
  display: flex; align-items: center; justify-content: center;
  color: var(--orange);
  font-size: 28px;
}

/* === HELPER === */
.flex-row { display: flex; gap: 16px; }
.col { flex: 1; }

</style>
<title>投影片 08</title>
</head>
<body>
<div class="slide">

<div class="grid-bg"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="topbar"><span class="brand">◆ 代理人技能</span><span class="nav">// IDEONOMY</span><span class="page-num">08 / 18</span></div>
<div class="title-area">
  <div class="title"><span style="color:var(--purple);">Ideonomy</span> — 觀念的科學</div>
</div>
<div style="position:absolute;top:165px;left:48px;right:48px;display:flex;gap:18px;">
  <div class="panel accent-purple" style="flex:1;">
    <div class="panel-body">
      Patrick Gunkel 是自學型博學者，曾由 Marvin Minsky 與 Ed Fredkin 安排在 MIT 活動。<br><br>
      他的主張是：<b style="color:var(--white);">觀念是自然現象。</b>它們有屬性，沿著不同維度存在，也能被系統性組合、變形與生成，就像化學處理分子。<br><br>
      他把所有觀念的空間稱為 <b style="color:var(--cyan);">ideocosm</b>：一個可以探索的關係結構，不只是腦中突然有光。
    </div>
  </div>
  <div class="panel accent-cyan" style="flex:1;">
    <div class="panel-body">
      Gunkel 把大量跨領域清單當作操作觀念的工具：<br><br>
      ▸ 找出一個現象的維度<br>
      ▸ 列出每個維度上的已知案例<br>
      ▸ 系統性變化、否定、替換、組合<br>
      ▸ 這些組合會產生直覺很難自己走到的觀念
    </div>
  </div>
</div>

</div>
</body>
</html>
